<html lang="zh-TW">
<head>

<title>(持股)台股技術分析報告</title>

<style>
* {
  box-sizing: border-box;
}

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: Arial, sans-serif;
  margin: 0;
}

.container {
  width: min(100%, 1600px);
  margin: 0 auto;
  padding: clamp(10px, 2vw, 20px);
}

h2 {
  margin: 0 0 12px 0;
  font-size: clamp(20px, 2.4vw, 30px);
}

.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: clamp(8px, 1.5vw, 15px);
  overflow: hidden;
}

.table-scroll {
  overflow: auto;
  max-height: min(70vh, 700px);
  position: relative;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  min-width: 1200px;
  border-collapse: separate;
  border-spacing: 0;
  font-size: clamp(11px, 1vw, 13px);
}

thead th {
  position: sticky;
  top: 0;
  background: #1c2330;
  z-index: 200;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 2px 0 #30363d;
}

thead th:hover {
  background: #263041;
}

tbody td {
  background: #161b22;
  position: relative;
  z-index: 1;
}

tbody td:first-child {
  position: sticky;
  left: 0;
  background: #161b22;
  z-index: 150;
}

thead th:first-child {
  position: sticky;
  top: 0;
  left: 0;
  background: #1c2330;
  z-index: 250;
}

th,
td {
  padding: clamp(6px, 0.8vw, 10px);
  border-bottom: 1px solid #30363d;
  border-right: 1px solid #30363d;
  white-space: nowrap;
  vertical-align: middle;
}

thead th,
tbody td:first-child {
  background-clip: padding-box;
}

.name {
  text-align: left;
  font-weight: bold;
}

.up {
  color: #f85149;
}

.dn {
  color: #3fb950;
}

.kd-bar,
.bb-bar {
  width: min(80px, 18vw);
  height: 6px;
  background: #222;
  border-radius: 3px;
  margin: 4px auto 0;
  position: relative;
}

.kd-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  position: absolute;
  top: -1px;
  transform: translateX(-50%);
}

.bb-dot {
  width: 6px;
  height: 10px;
  position: absolute;
  top: -2px;
  transform: translateX(-50%);
}

.sig {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  line-height: 1.4;
}

.sig.up {
  background: #3fb95022;
  color: #3fb950;
}

.sig.dn {
  background: #f8514922;
  color: #f85149;
}

.sig.watch {
  background: #d2992222;
  color: #d29922;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.box {
  padding: clamp(8px, 1.5vw, 12px);
  border-radius: 8px;
  text-align: center;
  min-width: 0;
  font-size: clamp(12px, 1vw, 14px);
}

.buy {
  background: #3fb95022;
}

.sell {
  background: #f8514922;
}

.watch {
  background: #d2992222;
}

.hold {
  background: #8b949e22;
}

.metric {
  text-align: center;
  line-height: 1.2;
}

.metric-main {
  font-size: 12px;
  font-weight: normal;
}

.metric-sub {
  font-size: 11px;
}

.text-red {
  color: #ff4d4f;
}

.text-green {
  color: #00b050;
}

/* 平板 */
@media (max-width: 1024px) {
  .container {
    padding: 12px;
  }

  .summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  table {
    min-width: 1000px;
    font-size: 11px;
  }

  th,
  td {
    padding: 6px;
  }
}

/* 手機 */
@media (max-width: 640px) {
  .container {
    padding: 8px;
  }

  .summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .card {
    padding: 6px;
    border-radius: 8px;
  }

  .table-scroll {
    max-height: 68vh;
  }

  table {
    min-width: 900px;
    font-size: 10px;
  }

  th,
  td {
    padding: 5px;
  }

  .metric-main,
  .metric-sub,
  .sig,
  small {
    font-size: 10px;
  }

  .kd-bar,
  .bb-bar {
    width: 56px;
  }
}
</style>

let currentSortKey = "";
let currentSortDirection = "asc";

function renderMetric(value, qoq, yoy) {
  const fmt = (v) => (v === null || v === undefined ? "-" : v);

  const arrow = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "↑" : v < 0 ? "↓" : "";
  };

  const colorClass = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "text-red" : v < 0 ? "text-green" : "";
  };

  return `
  <div class="metric">
    <div class="metric-main">${fmt(value)}</div>
    <div class="metric-sub">
      <small class="${colorClass(qoq)}">${arrow(qoq)}${fmt(qoq)}</small>
      <small class="${colorClass(yoy)}">${arrow(yoy)}${fmt(yoy)}</small>
    </div>
  </div>
  `;
}

function distClass(val) {
  if (val === null || val === undefined || val === "") return "";
  return Number(val) > 0 ? "up" : "dn";
}

function kdColor(k) {
  if (k > 75) return "#f85149";
  if (k < 25) return "#3fb950";
  return "#d29922";
}

function renderRow(s) {
  const chgPct = Number(s.chgPct ?? 0);
  const chgClass = chgPct >= 0 ? "up" : "dn";
  const chgSign = chgPct >= 0 ? "+" : "";
  const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
  const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

  return `
  <tr>
    <td class="name">${s.name ?? ""}</td>

    <td>${s.amp ?? 0}%</td>

}

function renderTable(data) {

function getSortValue(s, key) {

    }

    const result = String(aVal).localeCompare(String(bVal), "zh-Hant");
    return currentSortDirection === "asc" ? result : -result;
  });

  renderTable(sortedStocks);
  updateSortIndicators();
}

function updateSortIndicators() {
  document.querySelectorAll("thead th").forEach((th) => {
    const key = th.dataset.key;
    if (!key) return;

    if (!th.dataset.label) {
      th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
    }

    if (key === currentSortKey) {
      th.innerHTML = `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`;
    } else {
      th.innerHTML = th.dataset.label;
    }
  });
}

function bindSorting() {
  document.querySelectorAll("thead th[data-key]").forEach((th) => {
    th.addEventListener("click", () => {
      sortStocks(th.dataset.key);
    });
  });
}

const buy = stocks.filter(s => s.sig === 1).length;
const sell = stocks.filter(s => s.sig === -1).length;
const watch = stocks.filter(s => s.strategy === "觀察").length;
const hold = stocks.filter(s => s.strategy === "整理").length;

renderTable(sortedStocks);
bindSorting();

document.getElementById("buyCount").innerText = buy;
document.getElementById("sellCount").innerText = sell;
document.getElementById("watchCount").innerText = watch;
document.getElementById("holdCount").innerText = hold;
</script>
