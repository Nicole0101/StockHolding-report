<script>
// ===== 直接用你原本資料（關鍵修正） =====
const stocks = window.stocksData || window.stocks || [];

// ===== 安全數值轉換 =====
function toNum(v){
  if(v === null || v === undefined || v === "-") return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

// ===== 評分 =====
function calcScore(s){
  let score = 0;

  if(s.k < 20) score += 3;
  else if(s.k < 30) score += 2;
  else if(s.k > 70) score -= 2;

  if(s.bias6 < -3) score += 2;
  if(s.bias18 < -5) score += 2;

  if(s.bb?.includes("下")) score += 2;
  if(s.bb?.includes("上")) score -= 2;

  if(toNum(s.per) && toNum(s.per) < 15) score += 1;
  if(toNum(s.per) && toNum(s.per) > 60) score -= 1;

  if(toNum(s.yield) > 4) score += 1;

  return score;
}

function strategyLabel(score){
  if(score >= 6) return "🔥強力反彈";
  if(score >= 4) return "✅可布局";
  if(score >= 2) return "👀觀察";
  return "❌避免";
}

// ===== 初始化 =====
stocks.forEach(s=>{
  s.score = calcScore(s);
  s.strategy = strategyLabel(s.score);
});

// ===== 預設排序 =====
stocks.sort((a,b)=> b.score - a.score);

// ===== render =====
function render(){
  document.getElementById("stockBody").innerHTML =
    stocks.map(s=>`
      <tr>
        <td>${s.name}</td>
        <td>${s.code}</td>
        <td>${s.price}</td>
        <td class="${s.chgPct>=0?'up':'dn'}">${s.chgPct}%</td>
        <td>${s.eps_last}</td>
        <td>${s.gross_margin ?? "-"}</td>
        <td>${s.k}</td>
        <td>${s.bias6}</td>
        <td><b>${s.score}</b></td>
        <td>${s.strategy}</td>
      </tr>
    `).join("");

  renderTop();
}

// ===== Top Picks =====
function renderTop(){
  const top = stocks.slice(0,5);
  document.getElementById("topPicks").innerHTML =
    top.map(s=>`
      <div class="pick">
        ${s.name} (${s.code})<br>
        ⭐ ${s.score}<br>
        ${s.strategy}
      </div>
    `).join("");
}

// ===== 排序 =====
let sortState = {};

function sortTable(key){
  const asc = sortState[key] = !sortState[key];

  stocks.sort((a,b)=>{
    let v1 = a[key];
    let v2 = b[key];

    const n1 = toNum(v1);
    const n2 = toNum(v2);

    // 數值排序
    if(n1 !== null && n2 !== null){
      return asc ? n1 - n2 : n2 - n1;
    }

    // 字串排序（策略 / 名稱）
    v1 = String(v1);
    v2 = String(v2);

    return asc
      ? v1.localeCompare(v2, 'zh-Hant')
      : v2.localeCompare(v1, 'zh-Hant');
  });

  render();
}

render();
</script>
