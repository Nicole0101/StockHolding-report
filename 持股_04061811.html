function renderMetric(value, qoq, yoy) {
  const fmt = (v) => (v === null || v === undefined ? "-" : v);

  const arrow = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "↑" : v < 0 ? "↓" : "";
  };

  const colorClass = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "text-red" : v < 0 ? "text-green" : "";
  };

  return `
    <div class="metric">
      <div class="main">${fmt(value)}</div>
      <div class="sub">
        <span class="${colorClass(qoq)}">${arrow(qoq)}${fmt(qoq)}</span>
        <span class="${colorClass(yoy)}">${arrow(yoy)}${fmt(yoy)}</span>
      </div>
    </div>
  `;
}

function distClass(val) {
  if (!val) return "";
  return val > 0 ? "up" : "dn";
}

function kdColor(k){
  if(k > 75) return "#f85149";
  if(k < 25) return "#3fb950";
  return "#d29922";
}

function bbPosition(bb){
  if(!bb) return 50;
  if(bb.includes("上")) return 80;
  if(bb.includes("下")) return 20;
  return 50;
}

function renderRow(s){
  const chgClass = s.chgPct >= 0 ? "up":"dn";
  const chgSign = s.chgPct >= 0 ? "+" : "";
  const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
  const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

  return `
  <tr>
    <td class="name">${s.name}</td>
    <td>${s.code}</td>
    <td>${s.price}</td>
    <td class="${chgClass}">${chgSign}${s.chg}</td>
    <td class="${chgClass}">${chgSign}${s.chgPct}%</td>
    <td>${s.amp ?? 0}%</td>
    <td>${s.eps_Y ?? "-"}</td>

    <td>
      <small>TTM:</small> ${s.eps_ttm ?? "-"} <br>
      <small>預估:</small> ${s.eps_est ?? "-"}
    </td>

    <td>
      ${renderMetric(
        s.gross_margin,
        s.gross_margin_qoq,
        s.gross_margin_yoy_diff
      )}
    </td>

    <td>
      ${renderMetric(
        s.operating_margin,
        s.operating_margin_qoq,
        s.operating_margin_yoy_diff
      )}
    </td>

    <td>
      ${renderMetric(
        s.net_margin,
        s.net_margin_qoq,
        s.net_margin_yoy_diff
      )}
    </td>

    <td>${s.yield?.yield ?? "-"}%</td>

    <td>
      <small>TTM:</small> ${s.per_ttm ?? "-"} <br>
      <small>預估:</small> ${s.per_est ?? "-"}
    </td>

    <td>
      ${s.k}/${s.d}
      <div class="kd-bar">
        <div class="kd-dot" style="left:${s.k}%; background:${kdColor(s.k)}"></div>
      </div>
    </td>

    <td>
      ${s.bb_pct ?? "-"}%
      <div class="bb-bar">
        <div class="bb-dot"
         style="left:${s.bb_pct ?? 50}%; background:#58a6ff">
        </div>
      </div>
    </td>

    <td class="${distClass(s.bias6)}">${s.bias6 ?? ""}%</td>
    <td class="${distClass(s.bias18)}">${s.bias18 ?? ""}%</td>
    <td class="${distClass(s.bias50)}">${s.bias50 ?? ""}%</td>
    <td> <span class="sig ${sigClass[s.sig]}">${sigLabel[s.sig]}</span></td>
    <td>${s.strategy}</td>
  </tr>`;
}

// ✅ 統計（放外面）
const rebound = stocks.filter(s => s.strategy?.includes("反彈")).length;
const sell = stocks.filter(s => s.strategy?.includes("出貨")).length;
const watch = stocks.filter(s => s.strategy === "觀察").length;
const hold = stocks.filter(s => s.strategy === "整理").length;

// render
document.getElementById("stockBody").innerHTML =
  stocks.map(renderRow).join("");

// summary
document.getElementById("buyCount").innerText = rebound;
document.getElementById("sellCount").innerText = sell;
document.getElementById("watchCount").innerText = watch;
document.getElementById("holdCount").innerText = hold;
</script>
