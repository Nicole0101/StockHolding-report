<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(持股)台股技術分析報告</title>

<style>
body { background:#0d1117; color:#e6edf3; font-family:Arial; }
.container { max-width:1400px; margin:auto; padding:20px; }

.card { 
  background:#161b22; 
  border:1px solid #30363d; 
  border-radius:10px; 
  padding:15px; 
  overflow:auto;
  max-height:600px;
}

table { 
  width:100%; 
  border-collapse:separate;
  border-spacing:0;
  min-width:1000px;
  font-size:12px;
}

thead th {
  position:sticky;
  top:0;
  background:#1c2330;
  z-index:10;
}

thead th:first-child,
tbody td:first-child {
  position:sticky;
  left:0;
  background:#1c2330;
  z-index:11;
}

th, td {
  padding:8px;
  border-bottom:1px solid #30363d;
  border-right:1px solid #30363d;
}

.name { text-align:left; font-weight:bold; }

.up { color:#f85149; }
.dn { color:#3fb950; }

.kd-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.kd-dot { width:8px; height:8px; border-radius:50%; position:absolute; top:-1px; transform:translateX(-50%); }

.bb-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.bb-dot { width:6px; height:10px; position:absolute; top:-2px; transform:translateX(-50%); }

.summary { display:flex; gap:10px; margin-bottom:10px; }
.box { flex:1; padding:10px; border-radius:8px; text-align:center; }
.buy { background:#3fb95022; }
.sell { background:#f8514922; }
.watch { background:#d2992222; }
.hold { background:#8b949e22; }
</style>
</head>

<body>

<div class="container">

<h2>(持股)台股技術分析報告</h2>

<div class="summary">
  <div class="box buy"><b id="buyCount"></b><br>反彈</div>
  <div class="box sell"><b id="sellCount"></b><br>出貨</div>
  <div class="box watch"><b id="watchCount"></b><br>觀察</div>
  <div class="box hold"><b id="holdCount"></b><br>整理</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>名稱</th>
<th>代碼</th>
<th>價格</th>
<th>漲跌</th>
<th>漲跌%</th>
<th>震幅%</th>
<th>去年EPS</th>
<th>估EPS</th>
<th>毛利率</th>
<th>營益率</th>
<th>淨利率</th>
<th>殖利率</th>
<th>本益比</th>
<th>KD</th>
<th>布林</th>
<th>Bias6</th>
<th>Bias18</th>
<th>Bias50</th>
<th>訊號</th>
<th>策略</th>
</tr>
</thead>
<tbody id="stockBody"></tbody>
</table>
</div>

</div>

<script>
const stocks = {{ stocks | tojson }};
</script>

function distClass(val) {
  if (!val) return "";
  return val > 0 ? "up" : "dn";
}

<script>
function kdColor(k){
  if(k > 75) return "#f85149";
  if(k < 25) return "#3fb950";
  return "#d29922";
}

function bbPosition(bb){
  if(!bb) return 50;
  if(bb.includes("上")) return 80;
  if(bb.includes("下")) return 20;
  return 50;
}

function renderRow(s){

  const chgClass = s.chgPct >= 0 ? "up":"dn";
  const chgSign = s.chgPct >= 0 ? "+" : "";
  const yieldVal = (typeof s.yield === 'object' && s.yield !== null) ? s.yield.yield : s.yield;
  const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
  const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

  return `
  <tr>
    <td class="name">${s.name}</td>
    <td>${s.code}</td>
    <td>${s.price}</td>
    <td class="${chgClass}">${chgSign}${s.chg}</td>
    <td class="${chgClass}">${chgSign}${s.chgPct}%</td>
    <td>${s.amp ?? 0}%</td>
    <td>${s.eps_Y ?? "-"}</td>
    #    <td>${s.eps_ttm ?? "-"} 
    #    <td>${s.eps_est ?? "-"} 
    
    <td>${s.eps_ttm ?? "-"} / ${s.eps_est ?? "-"}</td>
    <td>
      <small style="color: gray;">TTM:</small> ${s.eps_ttm ?? "-"} <br>
      <small style="color: blue;">預估:</small> ${s.eps_est ?? "-"}
    </td>

    <td class="${distClass(s.gross_margin)}">${s.gross_margin ?? ""}%</td>
    <td class="${distClass(s.oerating_Margin)}">${s.op_margin ?? ""}%</td>
    <td class="${distClass(s.net_margin)}">${s.net_margin ?? ""}%</td>
    #    <td>${s.yield != null ? s.yield + "%" : "-"}</td>
    <td>${s.yield?.yield ?? "-"}%</td>

    <td>${s.per_estcombined ?? "-"}</td>    
    <td>${s.per_ttm ?? "-"} / ${s.per_est ?? "-"}</td>
    <td>
      <small style="color: gray;">TTM:</small> ${s.per_ttm ?? "-"} <br>
      <small style="color: blue;">預估:</small> ${s.per_est ?? "-"}
    </td>


    <td>${s.k}/${s.d}
        <div class="kd-bar">
        <div class="kd-dot" style="left:${s.k}%; background:${kdColor(s.k)}"></div>
      </div>
    </td>
    <td>
      ${s.bb}
      <div class="bb-bar">
        <div class="bb-dot" style="left:${bbPosition(s.bb)}%; background:#58a6ff"></div>
      </div>
    </td>

    <!-- 乖離率 -->
    <td class="${distClass(s.bias6)}">${s.bias6 ?? ""}%</td>
    <td class="${distClass(s.bias18)}">${s.bias18 ?? ""}%</td>
    <td class="${distClass(s.bias50)}">${s.bias50 ?? ""}%</td>
    <td><span class="sig ${sigClass[s.sig]}">${sigLabel[s.sig]}</span></td>
    <td>${s.strategy}</td>
  </tr>
  `;
}

document.getElementById("stockBody").innerHTML =
  stocks.map(renderRow).join("");


// ===== 統計（改用 strategy）=====
const rebound = stocks.filter(s => s.strategy?.includes("反彈")).length;
const sell = stocks.filter(s => s.strategy?.includes("出貨")).length;
const watch = stocks.filter(s => s.strategy === "觀察").length;
const hold = stocks.filter(s => s.strategy === "整理").length;

document.getElementById("buyCount").innerText = rebound;
document.getElementById("sellCount").innerText = sell;
document.getElementById("watchCount").innerText = watch;
document.getElementById("holdCount").innerText = hold;
</script>

</body>
</html>
