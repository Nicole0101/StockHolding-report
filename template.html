<script>
  const stocks = {{ stocks | tojson }};
  let sortedStocks = [...stocks];
  let currentSortKey = "";
  let currentSortDirection = "asc";

  function renderMetric(value, qoq, yoy) {
    const fmt = (v) => (v === null || v === undefined ? "-" : v);
    const arrow = (v) => {
      if (v === null || v === undefined) return "";
      return v > 0 ? "↑" : v < 0 ? "↓" : "";
    };
    const colorClass = (v) => {
      if (v === null || v === undefined) return "";
      return v > 0 ? "text-red" : v < 0 ? "text-green" : "";
    };

    return `
      <div class="metric">
        <div class="metric-main">${fmt(value)}</div>
        <div class="metric-sub">
          <small class="${colorClass(qoq)}">${arrow(qoq)}${fmt(qoq)}</small>
          <small class="${colorClass(yoy)}">${arrow(yoy)}${fmt(yoy)}</small>
        </div>
      </div>`;
  }

  function distClass(val) {
    if (val === null || val === undefined || val === "") return "";
    return Number(val) > 0 ? "up" : "dn";
  }

  function kdColor(k) {
    if (k > 75) return "#f85149";
    if (k < 25) return "#3fb950";
    return "#d29922";
  }

  function renderRow(s) {
    const chgPct = Number(s.chgPct ?? 0);
    const chgClass = chgPct >= 0 ? "up" : "dn";
    const chgSign = chgPct >= 0 ? "+" : "";
    const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
    const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

    return `
      <tr>
        <td class="name">${s.name ?? ""}</td>
        <td>${s.code ?? ""}</td>
        <td>${s.price ?? ""}</td>
        <td class="${chgClass}">${chgSign}${s.chg ?? ""}</td>
        <td class="${chgClass}">${chgSign}${s.chgPct ?? ""}%</td>

        <td class="col-md">${s.amp ?? 0}%</td>
        <td class="col-lg">${s.eps_Y ?? "-"}</td>

        <td class="col-lg">
          <small>TTM:</small> ${s.eps_ttm ?? "-"} <br>
          <small>預估:</small> ${s.eps_est ?? "-"}
        </td>

        <td class="col-lg">${renderMetric(s.gross_margin, s.gross_margin_qoq, s.gross_margin_yoy_diff)}</td>
        <td class="col-lg">${renderMetric(s.operating_margin, s.operating_margin_qoq, s.operating_margin_yoy_diff)}</td>
        <td class="col-lg">${renderMetric(s.net_margin, s.net_margin_qoq, s.net_margin_yoy_diff)}</td>

        <td class="col-md">${s.score ?? "-"}</td>
        <td class="col-md">${s.yield?.yield ?? s.yield ?? "-"}%</td>

        <td class="col-lg">
          <small>TTM:</small> ${s.per_ttm ?? "-"} <br>
          <small>預估:</small> ${s.per_est ?? "-"}
        </td>

        <td>
          ${s.k ?? "-"}/${s.d ?? "-"}
          <div class="kd-bar">
            <div class="kd-dot" style="left:${s.k ?? 50}%; background:${kdColor(Number(s.k ?? 50))}"></div>
          </div>
        </td>

        <td class="col-md">
          ${s.bb_pct ?? "-"}%
          <div class="bb-bar">
            <div class="bb-dot" style="left:${s.bb_pct ?? 50}%; background:#58a6ff"></div>
          </div>
        </td>

        <td class="col-lg ${distClass(s.bias6)}">
          <div>${s.bias6 ?? "-"}%</div>
          <small class="text-green"> ${s.bias6_min ?? "-"}</small>
          &nbsp;&nbsp;
          <small class="text-red"> ${s.bias6_max ?? "-"}</small>
        </td>

        <td class="col-lg ${distClass(s.bias18)}">
          <div>${s.bias18 ?? "-"}%</div>
          <small class="text-green">m ${s.bias18_min ?? "-"}</small>
          &nbsp;&nbsp;
          <small class="text-red"> ${s.bias18_max ?? "-"}</small>
        </td>

        <td class="col-lg ${distClass(s.bias50)}">
          <div>${s.bias50 ?? "-"}%</div>
          <small class="text-green"> ${s.bias50_min ?? "-"}</small>
          &nbsp;&nbsp;
          <small class="text-red"> ${s.bias50_max ?? "-"}</small>
        </td>

        <td class="col-md">
          ${s.ma18 ?? "-"}<br>
          <small class="${s.ma18_break ? 'text-red' : ''}">
            ${s.ma18_break ? '站上月線' : ''}
          </small>
        </td>

        <td class="col-md">
          ${s.volume ?? "-"} 張<br>
          <small>昨:${s.prev_volume ?? "-"}</small>
        </td>

        <td class="col-md ${(s.volume_ratio ?? 0) > 0 ? 'up' : 'dn'}">
          ${s.volume_ratio ?? "-"}%
          <br>
          <small>${s.volume_add ?? "-"} 張</small>
        </td>

        <td class="signal-cell">
          <div class="signal-wrap">
            <span class="sig ${sigClass[s.sig] ?? 'watch'}">${(sigLabel[s.sig] ?? '觀望').trim()}</span>
            <div class="signal-sub"><b>${s.signal_result ?? ""}</b></div>
            <div class="signal-sub">${s.signal_text ?? ""}</div>
            <div class="signal-sub">${s.strategy ?? ""}${s.entry_note ? ` / ${s.entry_note}` : ""}</div>
            <div class="signal-sub">${s.reason ?? ""}</div>
          </div>
        </td>
      </tr>`;
  }

  function renderMobileCard(s) {
    const chgPct = Number(s.chgPct ?? 0);
    const chgClass = chgPct >= 0 ? "up" : "dn";
    const chgSign = chgPct >= 0 ? "+" : "";
    const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
    const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

    return `
      <div class="stock-card">
        <div class="stock-head">
          <div>
            <div class="stock-title">${s.name ?? ""} (${s.code ?? ""})</div>
            <div class="stock-change ${chgClass}">${chgSign}${s.chg ?? ""} / ${chgSign}${s.chgPct ?? ""}%</div>
          </div>
          <div class="stock-price">${s.price ?? ""}</div>
        </div>

        <div class="stock-grid">
          <div class="stock-item">
            <div class="stock-label">KD</div>
            <div class="stock-value">${s.k ?? "-"} / ${s.d ?? "-"}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">Bias6</div>
            <div class="stock-value">${s.bias6 ?? "-"}% / ${s.bias6_min ?? "-"} / ${s.bias6_max ?? "-"}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">Bias18</div>
            <div class="stock-value">${s.bias18 ?? "-"}% / ${s.bias18_min ?? "-"} / ${s.bias18_max ?? "-"}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">Bias50</div>
            <div class="stock-value">${s.bias50 ?? "-"}% / ${s.bias50_min ?? "-"} / ${s.bias50_max ?? "-"}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">月線</div>
            <div class="stock-value">${s.ma18 ?? "-"} ${s.ma18_break ? " / 站上月線" : ""}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">成交量</div>
            <div class="stock-value">${s.volume ?? "-"} 張</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">量增%</div>
            <div class="stock-value ${((s.volume_ratio ?? 0) > 0) ? "up" : "dn"}">${s.volume_ratio ?? "-"}%</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">評分</div>
            <div class="stock-value">${s.score ?? "-"}</div>
          </div>

          <div class="stock-item">
            <div class="stock-label">殖利率</div>
            <div class="stock-value">${s.yield?.yield ?? s.yield ?? "-"}%</div>
          </div>
        </div>

        <div class="stock-signal">
          <div><span class="sig ${sigClass[s.sig] ?? 'watch'}">${(sigLabel[s.sig] ?? '觀望').trim()}</span></div>
          <div class="signal-sub"><b>${s.signal_result ?? ""}</b></div>
          <div class="signal-sub">${s.signal_text ?? ""}</div>
          <div class="signal-sub">${s.strategy ?? ""}${s.entry_note ? ` / ${s.entry_note}` : ""}</div>
          <div class="signal-sub">${s.reason ?? ""}</div>
        </div>
      </div>`;
  }
</script>
