<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(持股)台股技術分析報告</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .container {
      width: 100%;
      margin: 0;
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.25;
    }

    .card {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: clamp(8px, 1vw, 15px);
      overflow: hidden;
    }

    .table-scroll {
      overflow: auto;
      max-height: min(70vh, 700px);
      position: relative;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: clamp(11px, 1vw, 13px);
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1c2330;
      z-index: 200;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 0 #30363d;
    }

    thead th:hover {
      background: #263041;
    }

    tbody td {
      background: #161b22;
      position: relative;
      z-index: 1;
    }

    tbody td:first-child {
      position: sticky;
      left: 0;
      background: #161b22;
      z-index: 150;
    }

    thead th:first-child {
      position: sticky;
      top: 0;
      left: 0;
      background: #1c2330;
      z-index: 250;
    }

    th,
    td {
      padding: clamp(6px, 0.8vw, 10px);
      border-bottom: 1px solid #30363d;
      border-right: 1px solid #30363d;
      white-space: nowrap;
      vertical-align: middle;
    }

    thead th,
    tbody td:first-child {
      background-clip: padding-box;
    }

    .name {
      text-align: left;
      font-weight: bold;
    }

    .up {
      color: #f85149;
    }

    .dn {
      color: #3fb950;
    }

    .kd-bar,
    .bb-bar {
      width: min(80px, 18vw);
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin: 4px auto 0;
      position: relative;
    }

    .kd-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: absolute;
      top: -1px;
      transform: translateX(-50%);
    }

    .bb-dot {
      width: 6px;
      height: 10px;
      position: absolute;
      top: -2px;
      transform: translateX(-50%);
    }

    .sig {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
    }

    .sig.up {
      background: #3fb95022;
      color: #3fb950;
    }

    .sig.dn {
      background: #f8514922;
      color: #f85149;
    }

    .sig.watch {
      background: #d2992222;
      color: #d29922;
    }

    .signal-cell {
      min-width: 140px;
      white-space: normal;
      line-height: 1.4;
    }

    .signal-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .signal-sub {
      font-size: 11px;
      color: #8b949e;
      word-break: break-word;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      padding: clamp(8px, 1.5vw, 12px);
      border-radius: 8px;
      text-align: center;
      min-width: 0;
      font-size: clamp(12px, 1vw, 14px);
    }

    .buy {
      background: #3fb95022;
    }

    .sell {
      background: #f8514922;
    }

    .watch {
      background: #d2992222;
    }

    .hold {
      background: #8b949e22;
    }

    .metric {
      text-align: center;
      line-height: 1.2;
    }

    .metric-main {
      font-size: clamp(11px, 1vw, 12px);
      font-weight: normal;
    }

    .metric-sub {
      font-size: clamp(10px, 0.9vw, 11px);
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .text-red {
      color: #ff4d4f;
    }

    .text-green {
      color: #00b050;
    }

    .mobile-list {
      display: none;
    }

    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .stock-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stock-title {
      font-size: 15px;
      font-weight: bold;
    }

    .stock-price {
      font-size: 18px;
      font-weight: bold;
    }

    .stock-change {
      font-size: 13px;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      font-size: 12px;
    }

    .stock-item {
      min-width: 0;
    }

    .stock-label {
      color: #8b949e;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .stock-value {
      word-break: break-word;
    }

    .stock-signal {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #30363d;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .container {
        padding: 12px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      th,
      td {
        padding: 6px;
        font-size: 11px;
      }

      .col-lg {
        display: none;
      }

      .table-scroll {
        max-height: 65vh;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 8px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .card {
        padding: 0;
        border: none;
        background: transparent;
        overflow: visible;
      }

      .table-scroll {
        display: none;
      }

      .mobile-list {
        display: block;
      }
    }
  </style>
</head>

      const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
      const sigLabel = { 1: "買入", 0: "觀望", "-1": "賣出" };

      return `
        <div class="stock-card">
          <div class="stock-head">
            <div>
              <div class="stock-title">${s.name ?? ""} (${s.code ?? ""})</div>
              <div class="stock-change ${chgClass}">${chgSign}${fmt(s.chg)} / ${chgSign}${fmt(s.chgPct, "%")}</div>
            </div>
            <div class="stock-price">${fmt(s.price)}</div>
          </div>

          <div class="stock-grid">
            <div class="stock-item">
              <div class="stock-label">KD</div>
              <div class="stock-value">${fmt(s.k)} / ${fmt(s.d)}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">Bias6</div>
              <div class="stock-value">${fmt(s.bias6, "%")} / ${fmt(s.bias6_min)} / ${fmt(s.bias6_max)}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">Bias18</div>
              <div class="stock-value">${fmt(s.bias18, "%")} / ${fmt(s.bias18_min)} / ${fmt(s.bias18_max)}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">Bias50</div>
              <div class="stock-value">${fmt(s.bias50, "%")} / ${fmt(s.bias50_min)} / ${fmt(s.bias50_max)}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">月線</div>
              <div class="stock-value">${fmt(s.ma18)}${s.ma18_break ? ' / 站上月線' : ''}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">成交量</div>
              <div class="stock-value">${fmt(s.volume)} 張</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">量增%</div>
              <div class="stock-value ${((s.volume_ratio ?? 0) > 0) ? 'up' : 'dn'}">${fmt(s.volume_ratio, "%")}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">評分</div>
              <div class="stock-value">${fmt(s.score)}</div>
            </div>

            <div class="stock-item">
              <div class="stock-label">殖利率</div>
              <div class="stock-value">${fmt(s.yield?.yield ?? s.yield, "%")}</div>
            </div>
          </div>

          <div class="stock-signal">
            <div><span class="sig ${sigClass[s.sig] ?? 'watch'}">${(sigLabel[s.sig] ?? '觀望').trim()}</span></div>
            <div class="signal-sub"><b>${s.signal_result ?? ""}</b></div>
            <div class="signal-sub">${s.signal_text ?? ""}</div>
            <div class="signal-sub">${s.strategy ?? ""}${s.entry_note ? ` / ${s.entry_note}` : ""}</div>
            <div class="signal-sub">${s.reason ?? ""}</div>
          </div>
        </div>`;
    }

    function renderTable(data) {
      document.getElementById("stockBody").innerHTML = data.map(renderRow).join("");
    }

    function renderMobileCards(data) {
      document.getElementById("mobileList").innerHTML = data.map(renderMobileCard).join("");
    }

    function getSortValue(s, key) {
      switch (key) {
        case "name":
          return s.name ?? "";
        case "code":
          return s.code ?? "";
        case "sig":
          return Number(s.sig ?? -999999);
        case "yield":
          return Number(s.yield?.yield ?? s.yield ?? -999999);
        case "score":
          return Number(s.score ?? -999999);
        default: {
          const value = s[key];
          if (isNil(value) || value === "") return -999999;
          const num = Number(value);
          return Number.isNaN(num) ? String(value) : num;
        }
      }
    }

    function sortStocks(key) {
      if (currentSortKey === key) {
        currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
      } else {
        currentSortKey = key;
        currentSortDirection = "asc";
      }

      sortedStocks.sort((a, b) => {
        const aVal = getSortValue(a, key);
        const bVal = getSortValue(b, key);
        const bothNumbers = typeof aVal === "number" && typeof bVal === "number";

        if (bothNumbers) {
          return currentSortDirection === "asc" ? aVal - bVal : bVal - aVal;
        }

        const result = String(aVal).localeCompare(String(bVal), "zh-Hant");
        return currentSortDirection === "asc" ? result : -result;
      });

      renderTable(sortedStocks);
      renderMobileCards(sortedStocks);
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("thead th").forEach((th) => {
        const key = th.dataset.key;
        if (!key) return;

        if (!th.dataset.label) {
          th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
        }

        th.innerHTML = key === currentSortKey
          ? `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`
          : th.dataset.label;
      });
    }

    function bindSorting() {
      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          sortStocks(th.dataset.key);
        });
      });
    }

    const buy = sortedStocks.filter(s => s.strategy === "買入").length;
    const sell = sortedStocks.filter(s => (s.strategy ?? "").includes("出貨")).length;
    const watch = sortedStocks.filter(s => s.strategy === "觀察").length;
    const hold = sortedStocks.filter(s => s.strategy === "整理").length;

    renderTable(sortedStocks);
    renderMobileCards(sortedStocks);
    bindSorting();

    document.getElementById("buyCount").innerText = buy;
    document.getElementById("sellCount").innerText = sell;
    document.getElementById("watchCount").innerText = watch;
    document.getElementById("holdCount").innerText = hold;
  </script>

</body>

</html>
